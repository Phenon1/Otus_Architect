image: mcr.microsoft.com/dotnet/sdk:7.0

stages:
  - build
  - test

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .nuget/packages/

before_script:
  - dotnet restore

build:
  stage: build
  script:
    - dotnet build --configuration Release --no-restore

unit_tests:
  stage: test
  script:
    - dotnet test --configuration Release --no-build
